name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Unit & integration tests
        run: cargo test -- --test-threads=1

      - name: Stress tests
        run: cargo run --release --example stress

  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            benches: "textil_bench unix_socket_bench named_pipe_bench"
          - os: windows-latest
            benches: "textil_bench"

    runs-on: ${{ matrix.os }}
    name: Bench (${{ matrix.os }})
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Run benchmarks
        shell: bash
        env:
          BENCHES: ${{ matrix.benches }}
        run: |
          for bench in $BENCHES; do
            echo "========================================="
            echo " Running: $bench"
            echo "========================================="
            cargo run --release --example "$bench" || echo "WARN: $bench failed (non-fatal on CI)"
            echo ""
          done
